<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mohammed — Senior Engineer specializing in intelligent transportation systems, AI, and system integration."
    />
    <meta name="theme-color" content="#05070d" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Mohammed — Senior Engineer</title>
    <script>
      try {
        var stored = localStorage.getItem('portfolio-theme')
        if (stored !== 'light') document.documentElement.classList.add('dark')
      } catch (e) {
        document.documentElement.classList.add('dark')
      }
    </script>
    <script>
      // Decode the deep-link path encoded by public/404.html on GitHub Pages
      // (as ?p=/path&q=querystring) and restore it via history.replaceState
      // before React Router mounts.
      ;(function (l) {
        var params = new URLSearchParams(l.search)
        var p = params.get('p')
        if (p) {
          var q = params.get('q')
          var restoredSearch = q ? '?' + q.replace(/~and~/g, '&') : ''
          window.history.replaceState(
            null,
            '',
            l.pathname.replace(/\/$/, '') + p + restoredSearch + l.hash,
          )
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
